ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.creditoptimizer.ApplicationKt.module ]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/creditoptimizer"
    url = ${?DATABASE_URL}
    user = "postgres"
    user = ${?DATABASE_USER}
    password = "postgres"
    password = ${?DATABASE_PASSWORD}
}

auth0 {
    domain   = ${?AUTH0_DOMAIN}
    audience = ${?AUTH0_AUDIENCE}
}
